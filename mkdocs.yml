site_name: OT Piece Wiki
site_description: Wiki oficial do servidor OT Piece
site_url: https://kirojp.github.io/otpiece-wiki/

theme:
  name: material
  language: pt
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy

  palette:
    - scheme: slate              # Tema escuro como padrão
      primary: deep purple
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Modo Claro

  logo: assets/logo.png
  favicon: assets/favicon.ico

nav:
  - 🏠 Home: index.md
  - 👥 Personagens: personagens.md
  - ⚔️ Itens: itens.md
  - 📜 Quests: quests.md
  - 🗺️ Mapas: mapas.md
  - ℹ️ Sobre: sobre.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
  - attr_list
