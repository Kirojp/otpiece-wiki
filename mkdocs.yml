site_name: OT Piece Wiki
site_description: Wiki oficial do servidor OT Piece
site_url: https://seuusuario.github.io/otpiece-wiki/
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Modo Escuro

nav:
  - Home: index.md
  - Personagens: personagens.md
  - Itens: itens.md
  - Quests: quests.md
  - Mapas: mapas.md
  - Sobre: sobre.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
